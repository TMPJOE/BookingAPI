# API Gateway Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

logging:
  level: "info"
  format: "json"

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s

upstreams:
  - name: "users-service"
    url: "http://localhost:8081"
    path_prefix: "/api/v1/users"
    timeout: 10s
    health_path: "/health"
  - name: "hotels-service"
    url: "http://localhost:8082"
    path_prefix: "/api/v1/hotels"
    timeout: 10s
    health_path: "/health"
  - name: "rooms-service"
    url: "http://localhost:8083"
    path_prefix: "/api/v1/rooms"
    timeout: 10s
    health_path: "/health"
  - name: "bookings-service"
    url: "http://localhost:8084"
    path_prefix: "/api/v1/bookings"
    timeout: 10s
    health_path: "/health"
  - name: "payments-service"
    url: "http://localhost:8085"
    path_prefix: "/api/v1/payments"
    timeout: 10s
    health_path: "/health"
  - name: "notifications-service"
    url: "http://localhost:8086"
    path_prefix: "/api/v1/notifications"
    timeout: 10s
    health_path: "/health"