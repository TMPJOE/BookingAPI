# API Gateway Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

logging:
  level: "info"
  format: "json"

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s

upstreams:
  - name: "users-service"
    url: "http://user-service:8081"
    path_prefix: "/api/v1/users"
    timeout: 10s
    health_path: "/health"

  - name: "hotels-service"
    url: "http://hotel-service:8080"
    path_prefix: "/api/v1/hotels"
    timeout: 10s
    health_path: "/health"

  - name: "rooms-service"
    url: "http://rooms-service:8080"
    path_prefix: "/api/v1/rooms"
    timeout: 10s
    health_path: "/health"

  - name: "bookings-service"
    url: "http://booking-service:8080"
    path_prefix: "/api/v1/bookings"
    timeout: 10s
    health_path: "/health"

  - name: "media-service"
    url: "http://media-service:8080"
    path_prefix: "/api/v1/media"
    timeout: 10s
    health_path: "/health"

  - name: "bff-service"
    url: "http://bff-service:8080"
    path_prefix: "/api/v1"
    timeout: 10s
    health_path: "/health"
